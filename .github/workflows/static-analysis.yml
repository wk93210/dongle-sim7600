name: Static Analysis

on: [push, pull_request]

jobs:
  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --std=c11 \
            --error-exitcode=1 \
            --inline-suppr \
            -I. \
            -DASTERISK_VERSION_NUM=200190 \
            -D_GNU_SOURCE \
            -DHAVE_CONFIG_H \
            *.c 2>&1 | head -100

  clang-format:
    name: Check Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find . -name "*.c" -o -name "*.h" | grep -v tests/ | xargs clang-format --dry-run --Werror
        continue-on-error: true

  compiler-warnings:
    name: Compiler Warnings Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev \
            libxml2-dev libncurses-dev libssl-dev libjansson-dev \
            libedit-dev liburiparser-dev uuid-dev

      - name: Cache Asterisk source
        id: cache-asterisk
        uses: actions/cache@v4
        with:
          path: ~/asterisk-20.11.0-source
          key: asterisk-static-20.11.0-${{ runner.os }}

      - name: Download Asterisk 20.11.0
        if: steps.cache-asterisk.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget -q https://downloads.asterisk.org/pub/telephony/asterisk/releases/asterisk-20.11.0.tar.gz
          tar xzf asterisk-20.11.0.tar.gz
          mv asterisk-20.11.0 asterisk-20.11.0-source

      - name: Install Asterisk headers
        run: |
          cd ~/asterisk-20.11.0-source
          ./configure --disable-all --with-sqlite3 --disable-build-native \
            --without-pjproject --without-dahdi --without-libpri 2>&1 | tail -10
          make -j$(nproc) 2>&1 | tail -10
          sudo make install 2>&1 | tail -5

      - name: Build with all warnings
        run: |
          make clean
          CFLAGS="-fPIC -O2 -g -Wall -Wextra -Werror -pedantic -std=gnu11 \
            -DASTERISK_VERSION_NUM=200190 \
            -DAST_MODULE_SELF_SYM=__internal_chan_dongle_self \
            -DAST_MODULE=\"chan_dongle\" \
            -D_GNU_SOURCE -DHAVE_CONFIG_H -I. \
            -include $(pwd)/preinclude.h \
            -idirafter /usr/include/asterisk \
            -Wshadow -Wstrict-prototypes -Wmissing-prototypes \
            -Wmissing-declarations -Wcast-align -Wwrite-strings" \
          make 2>&1
