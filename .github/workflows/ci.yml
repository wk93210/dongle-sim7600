name: CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        include:
          - title: Asterisk 20
            asterisk_version: "20.11.0"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev \
            libxml2-dev libncurses-dev libssl-dev libjansson-dev \
            libedit-dev liburiparser-dev uuid-dev

      - name: Cache Asterisk source
        id: cache-asterisk
        uses: actions/cache@v4
        with:
          path: ~/asterisk-${{ matrix.asterisk_version }}-source
          key: asterisk-${{ matrix.asterisk_version }}-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Download Asterisk ${{ matrix.asterisk_version }}
        if: steps.cache-asterisk.outputs.cache-hit != 'true'
        env:
          ASTVER: ${{ matrix.asterisk_version }}
        run: |
          cd ~
          wget -q https://downloads.asterisk.org/pub/telephony/asterisk/releases/asterisk-${ASTVER}.tar.gz
          tar xzf asterisk-${ASTVER}.tar.gz
          mv asterisk-${ASTVER} asterisk-${ASTVER}-source

      - name: Install Asterisk headers
        env:
          ASTVER: ${{ matrix.asterisk_version }}
        run: |
          cd ~/asterisk-${ASTVER}-source
          ./configure --disable-all --with-sqlite3 --disable-build-native \
            --without-pjproject --without-dahdi --without-libpri 2>&1 | tail -20
          make -j$(nproc) 2>&1 | tail -20
          sudo make install 2>&1 | tail -10
          sudo make samples

      - name: Build chan_dongle
        run: |
          make clean
          make 2>&1

      - name: Run unit tests
        run: make test

      - name: Check module
        run: |
          ls -la chan_dongle.so
          file chan_dongle.so
          nm -D chan_dongle.so | grep -E "load_module|unload_module" || true
